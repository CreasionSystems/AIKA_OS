name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # On CI (no egress proxy) Electron's postinstall downloads its binary
      # normally, so a standard install provisions everything.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # System libraries Electron/Chromium need to launch under Xvfb.
      - name: Install Electron/Playwright system deps
        run: |
          npx playwright install-deps
          sudo apt-get install -y xvfb

      - name: E2E tests (Electron under Xvfb)
        run: npm run e2e

      # Accessibility checks (axe-core, unit level). Separate step so it gates
      # independently; can be extended to an axe-core E2E pass later.
      - name: Accessibility checks
        run: npm run test:a11y
